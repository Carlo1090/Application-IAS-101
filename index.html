<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-Shift Mirror Cipher</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        color: white;
        text-align: center;
        padding: 40px;
        margin: 0;
    }

    .container {
        background: rgba(0,0,0,0.4);
        padding: 30px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
        box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    textarea, input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 6px;
        border: none;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    .encrypt-btn {
        background-color: #00c853;
        color: white;
    }

    .decrypt-btn {
        background-color: #d50000;
        color: white;
    }

    .clear-btn {
        background-color: #ffab00;
        color: black;
    }

    button:hover {
        opacity: 0.85;
    }

    .output {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        word-wrap: break-word;
        min-height: 24px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>L-Shift Mirror Cipher</h1>

    <textarea id="message" rows="4" placeholder="Enter your message"></textarea><br>
    <input type="text" id="key" placeholder="Enter numeric key (e.g. 314)"><br>

    <button class="encrypt-btn" onclick="encrypt()">Encrypt</button>
    <button class="decrypt-btn" onclick="decrypt()">Decrypt</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>

    <div class="output" id="result"></div>
</div>

<script>

const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

function mirrorChar(char) {
    const index = alphabet.indexOf(char);
    if (index === -1) return char;
    return alphabet[25 - index];
}

function processText(text, key, mode) {
    let result = "";
    text = text.toUpperCase();
    let keyIndex = 0;

    for (let i = 0; i < text.length; i++) {
        let char = text[i];

        if (alphabet.includes(char)) {
            let letterIndex = alphabet.indexOf(char);
            let shift = parseInt(key[keyIndex % key.length]);

            if (mode === "encrypt") {
                // Step 1: Shift forward
                let shiftedIndex = (letterIndex + shift) % 26;
                let shiftedChar = alphabet[shiftedIndex];

                // Step 2: Mirror
                result += mirrorChar(shiftedChar);

            } else {
                // Step 1: Mirror first
                let mirrored = mirrorChar(char);
                let mirroredIndex = alphabet.indexOf(mirrored);

                // Step 2: Shift backward
                let originalIndex = (mirroredIndex - shift + 26) % 26;
                result += alphabet[originalIndex];
            }

            keyIndex++;
        } else {
            result += char; // keep spaces & symbols
        }
    }

    return result;
}

function encrypt() {
    const message = document.getElementById("message").value;
    const key = document.getElementById("key").value;

    if (!key.match(/^\d+$/)) {
        alert("Key must contain numbers only.");
        return;
    }

    const encrypted = processText(message, key, "encrypt");
    document.getElementById("result").innerText = encrypted;
    document.getElementById("message").value = encrypted;
}

function decrypt() {
    const message = document.getElementById("message").value;
    const key = document.getElementById("key").value;

    if (!key.match(/^\d+$/)) {
        alert("Key must contain numbers only.");
        return;
    }

    const decrypted = processText(message, key, "decrypt");
    document.getElementById("result").innerText = decrypted;
    document.getElementById("message").value = decrypted;
}

function clearAll() {
    document.getElementById("message").value = "";
    document.getElementById("result").innerText = "";
    document.getElementById("key").value = "";
}

</script>

</body>
</html>
