<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-Shift Mirror Cipher</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    width:360px;
    color:white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

textarea, input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:14px;
}

textarea{
    resize:none;
}

input{
    background:rgba(255,255,255,0.9);
}

textarea{
    background:rgba(255,255,255,0.9);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
    transition:0.3s ease;
}

.encrypt-btn{
    background:#4ade80;
    color:#0f172a;
}

.decrypt-btn{
    background:#f87171;
    color:white;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.result{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    min-height:40px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Encryption -->
    <div class="card">
        <h2>Encryption</h2>
        <textarea id="encryptInput" rows="3" placeholder="Enter message..."></textarea>
        <input type="text" id="encryptKey" placeholder="Enter numeric key (e.g. 314)">
        <button class="encrypt-btn" onclick="encrypt()">Encrypt</button>
        <div class="result" id="encryptResult">Waiting...</div>
    </div>

    <!-- Decryption -->
    <div class="card">
        <h2>Decryption</h2>
        <textarea id="decryptInput" rows="3" placeholder="Paste encrypted message..."></textarea>
        <button class="decrypt-btn" onclick="decrypt()">Decrypt</button>
        <div class="result" id="decryptResult">Waiting...</div>
    </div>

</div>

<script>
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let savedKey = "";

function mirrorChar(char){
    const index = alphabet.indexOf(char);
    if(index === -1) return char;
    return alphabet[25 - index];
}

function processText(text, key, mode){
    let result = "";
    text = text.toUpperCase();
    let keyIndex = 0;

    for(let i = 0; i < text.length; i++){
        let char = text[i];

        if(alphabet.includes(char)){
            let letterIndex = alphabet.indexOf(char);
            let shift = parseInt(key[keyIndex % key.length]);

            if(mode === "encrypt"){
                let shifted = (letterIndex + shift) % 26;
                result += mirrorChar(alphabet[shifted]);
            }else{
                let mirrored = mirrorChar(char);
                let mirroredIndex = alphabet.indexOf(mirrored);
                let original = (mirroredIndex - shift + 26) % 26;
                result += alphabet[original];
            }

            keyIndex++;
        }else{
            result += char;
        }
    }

    return result;
}

function encrypt(){
    const message = document.getElementById("encryptInput").value;
    const key = document.getElementById("encryptKey").value;

    if(!key.match(/^\d+$/)){
        alert("Key must be numbers only.");
        return;
    }

    savedKey = key;

    document.getElementById("encryptResult").innerText =
        processText(message, key, "encrypt");
}

function decrypt(){
    const message = document.getElementById("decryptInput").value;

    if(savedKey === ""){
        alert("Encrypt first to store the key.");
        return;
    }

    document.getElementById("decryptResult").innerText =
        processText(message, savedKey, "decrypt");
}
</script>

</body>
</html>
